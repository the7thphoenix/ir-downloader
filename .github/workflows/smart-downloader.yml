name: '📦 حرفه‌ای: دانلود و ذخیره در مخزن'

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: '🔗 لینک مستقیم فایل'
        required: true
        type: string
      password:
        description: '🔐 رمز فایل فشرده (اختیاری)'
        required: false
        type: string
        default: ''
      split_size:
        description: '📦 حجم هر تکه (پیش‌فرض: 95m) مثال: 95m, 100m, 200m'
        required: false
        type: string
        default: '95m'

permissions:
  contents: write  # مهم: اجازه پوش به مخزن

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🔄 دریافت کد مخزن
        uses: actions/checkout@v4
      - name: ⚙️ نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full file

      - name: 📥 دانلود فایل
        id: download
        run: |
          URL="${{ github.event.inputs.file_url }}"
          echo "در حال دانلود از: $URL"
          curl -L --fail --retry 5 --retry-delay 5 --progress-bar -o downloaded_file "$URL"
          if [ $? -ne 0 ]; then exit 1; fi
          ls -lh downloaded_file

      - name: 🧠 تشخیص نوع و استخراج نام اصلی
        id: classify
        run: |
          # نام اصلی از لینک
          RAW_NAME=$(basename "${{ github.event.inputs.file_url }}" | sed 's/\?.*//' | sed 's/%20/ /g')
          if [ -z "$RAW_NAME" ]; then RAW_NAME="unknown_file"; fi
          # حذف کاراکترهای غیرمجاز برای نام پوشه (جایگزینی با _)
          SAFE_NAME=$(echo "$RAW_NAME" | sed 's/[\\/:*?"<>|]/_/g')
          # تشخیص MIME
          MIME=$(file -b --mime-type downloaded_file)
          EXT="${RAW_NAME##*.}"
          EXT=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')
          
          if [[ "$MIME" == video/* ]] || [[ "$EXT" =~ ^(mp4|mkv|avi|mov|wmv|flv|webm)$ ]]; then
            CAT="video"
          elif [[ "$MIME" == audio/* ]] || [[ "$EXT" =~ ^(mp3|wav|ogg|flac|m4a)$ ]]; then
            CAT="audio"
          elif [[ "$MIME" == image/* ]] || [[ "$EXT" =~ ^(jpg|jpeg|png|gif|bmp|webp)$ ]]; then
            CAT="image"
          elif [[ "$MIME" == application/pdf ]] || [[ "$EXT" =~ ^(pdf|doc|docx|xls|xlsx|ppt|pptx|txt)$ ]]; then
            CAT="document"
          else
            CAT="other"
          fi
          
          echo "CAT=$CAT" >> $GITHUB_ENV
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          echo "✅ دسته: $CAT → زیرپوشه: $SAFE_NAME"

      - name: 🗜️ فشرده‌سازی و تقسیم (با اعمال رمز)
        run: |
          # پوشه نهایی: downloads/دسته/نام فایل/
          FINAL_DIR="downloads/${{ env.CAT }}/${{ env.SAFE_NAME }}"
          mkdir -p "$FINAL_DIR"
          
          # حذف فایل‌های قبلی در آن زیرپوشه (در صورت وجود) تا تداخل پیش نیاید
          rm -f "$FINAL_DIR"/*.7z*
          
          # فشرده‌سازی
          if [ -z "${{ github.event.inputs.password }}" ]; then
            7z a -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "./downloaded_file"
          else
            7z a -p"${{ github.event.inputs.password }}" -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "./downloaded_file"
          fi
          
          echo "✅ فایل در $FINAL_DIR ذخیره شد"
          ls -lh "$FINAL_DIR"

      - name: 📝 کامیت و پوش به مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add downloaded file: ${{ env.SAFE_NAME }} (category: ${{ env.CAT }})" || echo "Nothing to commit"
          git push
